name: "🐛 Bug Report"
description: "Report a bug to help us improve Mig"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Mig Version"
      description: "Run `mig --version` (or provide the commit hash/tag)"
      placeholder: "e.g., v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: driver
    attributes:
      label: "Database Driver"
      description: "Which database were you using when the issue occurred?"
      options:
        - postgresql
        - mysql
        - sqlite
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps"
      description: "How can we reproduce the bug? Please include your `mig.yml` (masking secrets)."
      placeholder: |
        1. Run '...'
        2. Set config to '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs/Output"
      description: "Copy and paste any relevant terminal output or error messages."
      render: shell
  - type: input
    id: os
    attributes:
      label: "Operating System"
      placeholder: "e.g., Ubuntu 22.04, Fedora 39, etc."
    validations:
      required: true
